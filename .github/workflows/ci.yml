name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python dependencies
      run: |
        pip install opencv-python numpy

    - name: Run concat_clips unit tests
      run: |
        python -m unittest concat_clips.test_concat_clips -v

    - name: Run concat_clips seam integration tests
      run: |
        python -m unittest concat_clips.test_concat_seams -v

    - name: Run motion_cctv e2e test
      run: |
        python motion_cctv/test_e2e.py
